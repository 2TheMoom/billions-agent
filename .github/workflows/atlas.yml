name: Atlas Autonomous Task

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run-atlas:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install

      - run: node run-atlas.js
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}

      - run: |
          git config --global user.name "Atlas Bot"
          git config --global user.email "atlas@bot.com"
          git add atlas-log.json
          git commit -m "Atlas automated update" || echo "No changes"
          git push
